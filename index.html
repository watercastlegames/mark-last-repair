<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#071423">
  <title>마크의 마지막 수리 · CASE 01</title>
  <link rel="stylesheet" href="assets/css/game.css?v=round55">
</head>
<body>
  <div id="app">
    <p class="notice">비공식 팬메이드 미스터리 프로토타입 · 실제 방송 이미지·대사·음성을 사용하지 않습니다.</p>
    <header id="gameHud" class="game-hud">
      <div class="brand"><span>CASE FILE 01</span><strong>마크의 마지막 수리</strong></div>
      <div class="hud-stat round-stat"><small>ROUND</small><b id="hudRound">준비 중</b></div>
      <div class="hud-stat timer-stat" id="hudTimeStat"><small>나의 누적 시간</small><b id="hudTime">00:00</b><em id="hudPenalty" aria-live="assertive"></em></div>
      <div class="hud-stat question-stat"><small>질문</small><b id="hudQuestions">0회</b></div>
      <div class="hud-stat leader-stat"><small>현재 1위 시간</small><b id="hudLeader">기록 없음</b><span id="hudLeaderMeta"></span></div>
      <button id="historyButton" class="hud-button" type="button">사건 기록</button>
      <button id="rankingButton" class="hud-button" type="button">랭킹</button>
    </header>
    <main id="caseDashboard" class="case-dashboard" aria-live="polite"></main>
  </div>
  <div id="popupRoot" aria-live="polite"></div>
  <div id="toastRoot" aria-live="assertive"></div>
  <button id="shareButton" class="social-fixed-link share-fixed-link" type="button" aria-label="게임 공유하기">
    <img src="assets/images/share.svg" alt="" width="30" height="30" aria-hidden="true">
    <span>공유하기</span>
  </button>
  <a class="social-fixed-link developer-fixed-link" href="developer.html" aria-label="개발자 정보 페이지로 이동">
    <strong class="developer-link-mark" aria-hidden="true">?</strong>
    <span>개발자 정보</span>
  </a>
  <script src="assets/js/firebase-config.js?v=round45"></script>
  <script defer src="assets/js/game-round54.bundle.js?v=round54"></script>
  <script defer src="assets/js/social-share.js?v=round49"></script>
</body>
</html>
